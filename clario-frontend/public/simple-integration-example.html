<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Personal Website - Clairo Widget Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2e8f0;
      max-width: 480px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #1e293b;
    }

    p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Welcome to My Business Page</h1>
    <p>This is a standard client website embedding the Clairo support chatbot. Look at the bottom right corner of the
      page to find the floating launcher button and start a chat conversation!</p>
  </div>

  <!-- 
    ========================================================================
    CLAIRO EMBEDDABLE CHAT WIDGET (DYNAMICALLY BOOTSTRAPPED)
    ========================================================================
    Instructions for testing:
    1. Simply open: http://localhost:5173/simple-integration-example.html?token=YOUR_WIDGET_TOKEN
    2. Replace 'YOUR_WIDGET_TOKEN' in the URL query parameters with the token 
       obtained from your Clairo Chatbot settings dashboard page.
  -->
  <script>
    // Grab the widget token dynamically from the browser address bar query parameter (?token=...)
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token') || 'b3bfd697-6f45-41b4-8ec4-16a7e3abacab';

    const widgetScript = document.createElement('script');
    widgetScript.src = 'http://localhost:5173/widget-loader.js';
    widgetScript.setAttribute('data-widget-token', token);
    widgetScript.setAttribute('data-theme-color', '#3b82f6');
    widgetScript.setAttribute('data-title', 'Customer Support');
    widgetScript.setAttribute('data-launcher-text', 'Chat with us');
    widgetScript.setAttribute('data-position', 'bottom-right');
    widgetScript.setAttribute('data-welcome-message', 'Hello! Welcome to our website. How can I help you today?');
    widgetScript.setAttribute('data-border-radius', '12px');
    widgetScript.defer = true;

    document.body.appendChild(widgetScript);
  </script>

</body>

</html>
